<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo img {
            width: 100%;
            max-width: 160px;
            /* height: auto; */
            height: 55px;
            display: block;
            object-fit: cover;
            border-radius: 50%;
            /* height: 50px; */
            /* width: auto; */
            display: block;
            filter: blur(1px);
        }

        .logo {
            /* width: 12vw; */
            width: 55px;
            /* min-width: 80px; */
            flex-shrink: 0;
            max-width: 160px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            /* justify-content: space-around; */
            align-items: center;
            font-family: sans-serif;
            color: white;
            background-color: black;
            /* width: 100vw; */
            /* padding-right: 16%; */
            padding: 10px 18px;
        }

        .right ul {
            display: flex;
            gap: 34px;
            list-style: none;
        }

        .right ul li {
            cursor: pointer;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .right ul li:hover {
            color: #ff9900;
        }

        @media (max-width: 768px) {
            nav {
                /* flex-direction: column;  */
                gap: 15px;
                /* padding-right: 15px; */
            }

            .logo {
                align-self: flex-start;
            }

            .right ul {
                display: flex;
                flex-wrap: nowrap;
                list-style: none;
                justify-content: center;
                gap: 14px;
                font-size: 14px;
            }


        }
    </style>
</head>
