<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }

        header {
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo img {
            width: 100%;
            max-width: 160px;
            /* height: auto; */
            height: 55px;
            display: block;
            object-fit: cover;
            border-radius: 50%;
            /* height: 50px; */
            /* width: auto; */
            display: block;
            filter: blur(1px);
        }

        .logo {
            /* width: 12vw; */
            width: 55px;
            /* min-width: 80px; */
            flex-shrink: 0;
            max-width: 160px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            /* justify-content: space-around; */
            align-items: center;
            font-family: sans-serif;
            color: white;
            background-color: black;
            /* width: 100vw; */
            /* padding-right: 16%; */
            padding: 10px 18px;
        }

        .right ul {
            display: flex;
            gap: 34px;
            list-style: none;
        }

        .right ul li {
            cursor: pointer;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .right ul li:hover {
            color: #ff9900;
        }

        .hero {
            /* justify-content: border box; */
            /* border: 2px solid black; */
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 80px 10%;
            min-height: 80vh;
            /* background-color: yellow; */

        }

        .hero-left {
            /* border: 2px solid yellow;
            border-radius: 50%;
            height: 350px;
            width: 350px;
            background-color: yellow;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px; */
            max-width: 50%;
            /* justify-self: ; */
        }

        main {
            background-color: #1f1e1e;
            font-family: sans-serif;
            /* color: #ffffff; */
        }

        .greeting {
            font-size: 1.2rem;
            color: #ff9900;
            /* Accent color */
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .name {
            font-size: 4rem;
            /* Make your name huge! */
            font-weight: bold;
            margin-bottom: 10px;
            line-height: 1.1;
        }

        .role {
            font-size: 2rem;
            color: #cccccc;
            margin-bottom: 20px;
        }

        .description {
            font-size: 1.1rem;
            color: #f8cbcb;
            margin-bottom: 30px;
            line-height: 1.6;
        }


        footer {
            background-color: rgb(14, 244, 14);
        }

        .hero-right {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-right img {
            /* width: 100%; */
            width: 350px;
            height: 350px;
            object-fit: cover;
            border-radius: 50%;
            border: 2p solid #333;
            box-shadow: 0 0 25px rgb(249, 0, 0);
            /* display: block; */
            /* max-width: 350px; */
        }

        .Resume-btn {
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            color: #121212;
            background-color: #ff9900;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .Resume-btn:hover {
            background-color: #e68a00;
            transform: translateY(-3px);

        }


        @media (max-width: 768px) {
            .hero {
                flex-direction: column-reverse;
                text-align: center;
                padding: 40px 5%;
                gap: 40px;
            }

            .hero-left {
                max-width: 100%;
            }

            .name {
                font-size: 2.8rem;
            }

            nav {
                /* flex-direction: column;  */
                gap: 15px;
                /* padding-right: 15px; */
            }

            .logo {
                align-self: flex-start;
            }

            .right ul {
                display: flex;
                flex-wrap: nowrap;
                list-style: none;
                justify-content: center;
                gap: 14px;
                font-size: 14px;
            }


        }
    </style>
</head>

            </div>

    <main>

        <section class="hero">

            <div class="about-container">

    <footer>

</body>

</html>
